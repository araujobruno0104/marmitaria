<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marmitaria Sabor Caseiro</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<header class="header">

<h1 id="nome-restaurante">Marmitaria Sabor Caseiro</h1>
<p id="slogan">Comida caseira feita com carinho</p>

</header>


<main class="container">

<!-- PRATO DO DIA -->

<section class="card prato">

<h2 class="titulo">
⭐ <span id="titulo-prato">Prato do Dia</span>
</h2>

<img
id="imagem-prato"
class="imagem-prato"
src=""
alt="Prato do dia"
>

<div class="descricao">

<p id="descricao-prato"></p>

<ul id="lista-ingredientes">
<!-- JS PREENCHE -->
</ul>

</div>

</section>


<!-- TAMANHOS -->

<section class="card tamanhos">

<h3>🍱 Escolha o Tamanho</h3>

<div id="lista-tamanhos">

<!-- JS ADICIONA -->

<div class="item">
<span>Pequena</span>
<b>R$ 16</b>
</div>

</div>

</section>


<!-- BOTÃO WHATSAPP -->

<a
id="botao-whatsapp"
class="botao"
href="#"
target="_blank"
>

📲 Pedir pelo WhatsApp

</a>


</main>


<footer class="footer">

<p id="endereco">
Rua Exemplo, 123
</p>

<p id="horario">
Aberto das 11h às 14h
</p>

</footer>


<script src="script.js"></script>

</body>
</html>
